services:
  - type: web
    name: smartspend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false  # User will provide their live Neon DB URL
      - key: REDIS_URL
        sync: false  # User will provide their live Upstash Redis URL
      - key: SECRET_KEY
        generateValue: true  # Render will auto-generate a secure Django SECRET_KEY

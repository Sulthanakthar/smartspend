services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=smartspend
      - POSTGRES_USER=smartspend_user
      - POSTGRES_PASSWORD=smartspend_pass
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartspend_user -d smartspend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 smartspend_project.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://smartspend_user:smartspend_pass@db:5432/smartspend
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    command: celery -A smartspend_project worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://smartspend_user:smartspend_pass@db:5432/smartspend
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
